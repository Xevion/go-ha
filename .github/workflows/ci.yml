name: CI

on:
  push:
  pull_request:

env:
  GO_VERSION: "1.26"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      # Its own module, so it is not covered by ./... and drifted out of
      # compiling once before.
      - name: Build example
        working-directory: example
        run: go build ./... && go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      # -race changes goroutine scheduling and hides timing-dependent logic
      # bugs, such as an event dispatched before an earlier one updated the
      # cache. A plain run, repeated, exercises the ordering the race detector
      # would otherwise paper over.
      - name: Test (no race)
        run: go test -count=3 ./...

  # The rest of the suite runs against a fake, which can only confirm this
  # package agrees with its own idea of the protocol. This job is the one that
  # can disagree with Home Assistant.
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Start and onboard Home Assistant
        run: ./.github/scripts/setup-live-ha.sh

      - name: Live tests
        env:
          HA_URL: http://localhost:8123
          HA_CONTAINER: ha
        run: |
          HA_TOKEN=$(cat "$RUNNER_TEMP/ha_token") go test -tags live -timeout 15m ./...
