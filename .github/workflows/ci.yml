name: CI

on:
  push:
  pull_request:

env:
  GO_VERSION: "1.26"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      # Its own module, so it is not covered by ./... and drifted out of
      # compiling once before.
      - name: Build example
        working-directory: example
        run: go build ./... && go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  # The rest of the suite runs against a fake, which can only confirm this
  # package agrees with its own idea of the protocol. This job is the one that
  # can disagree with Home Assistant.
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Start Home Assistant
        run: |
          mkdir -p "$RUNNER_TEMP/hacfg"
          docker run -d --name ha -p 8123:8123 \
            -v "$RUNNER_TEMP/hacfg:/config" \
            ghcr.io/home-assistant/home-assistant:stable
          for _ in $(seq 1 90); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 3 http://localhost:8123/ || true)
            if [ "$code" = "200" ] || [ "$code" = "302" ]; then exit 0; fi
            sleep 2
          done
          echo "Home Assistant did not start"; docker logs ha; exit 1

      - name: Onboard and configure
        run: ./.github/scripts/setup-live-ha.sh

      - name: Live tests
        env:
          HA_URL: http://localhost:8123
          HA_CONTAINER: ha
        run: |
          HA_TOKEN=$(cat "$RUNNER_TEMP/ha_token") go test -tags live -timeout 15m ./...
